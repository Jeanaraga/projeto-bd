<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Dashboard de Vendas</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <aside class="sidebar">
        <h2>Dashboard</h2>

        <nav>
            <a href="index.html">Dashboard</a>
            <a href="produtos.html" class="active">Produtos</a>
            <a href="vendas.html">Vendas</a>
            <a href="relatorios.html">Relatórios SQL</a>
        </nav>
    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <h1>Produtos</h1>
                <p>Cadastro, edição e controle de produtos</p>
            </div>
        </header>

        <section class="box">
            <h3 id="tituloFormulario">Cadastrar produto</h3>

            <form id="formProduto" class="form-grid">
                <input type="hidden" id="idProduto">

                <div class="form-group">
                    <label for="nome">Nome do produto</label>
                    <input type="text" id="nome" placeholder="Ex: Mouse Gamer" required>
                </div>

                <div class="form-group">
                    <label for="precoVenda">Preço de venda</label>
                    <input type="number" id="precoVenda" step="0.01" min="0.01" placeholder="Ex: 99.90" required>
                </div>

                <div class="form-group">
                    <label for="estoqueAtual">Estoque atual</label>
                    <input type="number" id="estoqueAtual" min="0" placeholder="Ex: 20" required>
                </div>

                <div class="form-group">
                    <label for="estoqueMinimo">Estoque mínimo</label>
                    <input type="number" id="estoqueMinimo" min="0" placeholder="Ex: 5" required>
                </div>

                <div class="form-group">
                    <label for="idCategoria">Categoria</label>
                    <select id="idCategoria" required>
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" required>
                        <option value="Ativo">Ativo</option>
                        <option value="Inativo">Inativo</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="btnSalvar">
                        Cadastrar
                    </button>

                    <button type="button" class="btn-secondary" id="btnLimpar">
                        Limpar
                    </button>
                </div>
            </form>
        </section>

        <section class="box">
            <div class="section-header">
                <h3>Lista de produtos</h3>

                <button class="btn-secondary" id="btnRecarregar">
                    Recarregar
                </button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Produto</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Mínimo</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="tabelaProdutos">
                        <tr>
                            <td colspan="8">Carregando produtos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="./js/produtos.js"></script>
</body>
</html>
